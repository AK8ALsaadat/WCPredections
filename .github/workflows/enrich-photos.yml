name: Enrich Player Photos

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      runApiFootball:
        description: 'Also run API-Football enrichment (requires API_FOOTBALL_KEY secret)'
        required: false
        default: 'false'

jobs:
  enrich:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20'
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run Wikimedia enrichment
        run: npm run enrich:wikimedia

      - name: Optionally run API-Football enrichment
        if: ${{ github.event.inputs.runApiFootball == 'true' }}
        run: |
          if [ -z "${API_FOOTBALL_KEY}" ]; then
            echo "API_FOOTBALL_KEY not set; skipping API-Football enrichment";
            exit 0;
          fi
          npm run enrich:api-football
